; =============================================================
;  asterisk_dialplan.conf
;  VOX Dialplan — routes incoming calls to AGI bridge
;  Include in /etc/asterisk/extensions.conf:
;    #include "extensions_vox.conf"
; =============================================================

[vox]

; Entry point — called when someone dials the VOX extension
exten => 1000,1,NoOp(VOX Call Started)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(agi_bridge.py)
 same => n,Hangup()

; Catch-all for any unhandled errors
exten => i,1,NoOp(Invalid extension)
 same => n,Hangup()

exten => t,1,NoOp(Timeout)
 same => n,Hangup()
