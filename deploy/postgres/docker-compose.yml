services:
  postgres:
    image: postgres:16
    container_name: vox-postgres-test
    environment:
      POSTGRES_USER: vox
      POSTGRES_PASSWORD: vox
      POSTGRES_DB: vox_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vox -d vox_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - vox_postgres_test_data:/var/lib/postgresql/data

volumes:
  vox_postgres_test_data:
