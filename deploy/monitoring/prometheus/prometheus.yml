global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/vox-alerts.yml

scrape_configs:
  - job_name: vox
    metrics_path: /api/metrics
    scheme: http
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/vox_metrics_token
    static_configs:
      - targets:
          - host.docker.internal:5000
        labels:
          service: vox
